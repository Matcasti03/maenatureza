<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

  <link rel="stylesheet" href="css/logar.css">
</head>


<body>

    <header></header>

    <div class="container">

        <div class="login-box">

            <img src="../img/logo.png" alt="Logo" class="logo">

            <label>E-mail:</label>
            <input type="email" placeholder="Digite seu e-mail">

            <label>Senha:</label>

            <div class="senha-box">

                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha">
<button type="button" onclick="document.body.classList.toggle('dark')" class="btn-dark">
    🌙 
</button>
                <span class="olho" onclick="mostrarSenha()">
                    👁️
                </span>

            </div>

            <form action="criarConta.html">
    <button type="submit" class="btn-criar">Criar Conta</button>
</form>

            <div class="btn-area">

                <form action="esqueciminhasenhaL.html">
                    <button type="submit" class="btn-esqueci">
                        Esqueci minha senha
                    </button>
                </form>

                <form action="index.html">
                    <button type="submit" class="btn-entrar">
                        Entrar
                    </button>
                </form>

            </div>

        </div>

    </div>

  <script src="../js/script.js"></script>

</body>

</html>
